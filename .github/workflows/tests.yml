name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check shell syntax
        run: find skills tests -type f -name '*.sh' -print0 | xargs -0 -n 20 bash -n
      - name: Run test suite
        run: bash tests/run.sh
